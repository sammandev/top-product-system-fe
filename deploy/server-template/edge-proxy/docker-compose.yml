name: top-product-edge-proxy

services:
  edge-proxy:
    image: nginx:1.27-alpine
    container_name: ast-tools-edge-proxy
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/upstreams:/etc/nginx/upstreams:ro
      - edge_proxy_logs:/var/log/nginx
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:9090/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    extra_hosts:
      - "host.docker.internal:host-gateway"
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    networks:
      - ast-tools-edge

volumes:
  edge_proxy_logs:

networks:
  ast-tools-edge:
    external: true
    name: ast-tools-edge